<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to match DevTools aesthetic */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #242424; 
        }
        ::-webkit-scrollbar-thumb {
            background: #555; 
            border: 2px solid #242424;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }
        
        /* Triangle indicator for details tags */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary::before {
            content: '▶';
            font-size: 8px;
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.1s ease-in-out;
        }
        details[open] > summary::before {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-[#242424] text-[#cccccc] font-sans text-[13px] h-screen flex flex-col overflow-hidden select-none">

    <div class="flex flex-1 overflow-hidden">
        
        <div class="w-1/3 border-r border-[#444] flex flex-col bg-[#202124]">
            <div class="border-b border-[#444] px-3 py-1 font-semibold text-[#eee] flex items-center shadow-sm">
                Name
            </div>
            <div id="network-list" class="flex-1 overflow-y-auto outline-none" tabindex="0">
                </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#242424]">
            
            <div class="flex border-b border-[#444] px-2 pt-1 gap-5 text-[13px]">
                <div class="flex items-center justify-center cursor-pointer pb-1 text-[#8ab4f8] border-b-2 border-[#8ab4f8]">Headers</div>
                <div class="flex items-center justify-center cursor-pointer pb-1 hover:text-[#eee] border-b-2 border-transparent">Payload</div>
                <div class="flex items-center justify-center cursor-pointer pb-1 hover:text-[#eee] border-b-2 border-transparent">Messages</div>
                <div class="flex items-center justify-center cursor-pointer pb-1 hover:text-[#eee] border-b-2 border-transparent">Initiator</div>
                <div class="flex items-center justify-center cursor-pointer pb-1 hover:text-[#eee] border-b-2 border-transparent">Timing</div>
            </div>

            <div id="network-details" class="flex-1 overflow-y-auto">
                <div class="flex h-full items-center justify-center text-[#777]">
                    Select a network request to view details
                </div>
            </div>

        </div>
    </div>

    <div class="h-7 border-t border-[#444] bg-[#202124] flex items-center px-3 gap-4 text-[#888] text-xs">
        <span>15 requests</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>4.5 MB transferred</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>19.4 MB resources</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>Finish: 30.4 min</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span class="text-[#8ab4f8]">DOMContentLoaded: 3.53 s</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span class="text-[#f28b82]">Load: 5.53 s</span>
    </div>

    <script>
        // 1. Example Data mapped to your requested schema
        const networkLogs = [
            {
                id: 1,
                type_icon: '⇄',
                type_color: 'text-gray-400',
                host_url: "wss://ws.chatgpt.com",
                path: "/p20/ws/user/user-9hUIRMtVZ...",
                from: "Client Browser",
                to: "WebSocket Server (US-East)",
                http_status: 101,
                http_method: "GET",
                request: {
                    "Origin": "https://chatgpt.com",
                    "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
                    "Sec-WebSocket-Version": "13"
                },
                response: {
                    "Upgrade": "websocket",
                    "Connection": "Upgrade",
                    "Sec-WebSocket-Accept": "s3pPLMBiTxaQ9kYGzzhZRbK+xOo="
                }
            },
            {
                id: 2,
                type_icon: '{ }',
                type_color: 'text-yellow-400',
                host_url: "https://api.example.com",
                path: "/v1/manifest-d0b0cce2.json",
                from: "Service Worker",
                to: "CDN Edge Node",
                http_status: 200,
                http_method: "GET",
                request: {
                    "Accept": "application/json",
                    "Authorization": "Bearer token123..."
                },
                response: {
                    "Content-Type": "application/json",
                    "Cache-Control": "max-age=3600",
                    "Server": "cloudflare"
                }
            },
            {
                id: 3,
                type_icon: 'JS',
                type_color: 'text-orange-400',
                host_url: "https://cdn.example.com",
                path: "/assets/85c26ade-n990fhyb.js",
                from: "Index HTML",
                to: "Static Server",
                http_status: 304,
                http_method: "GET",
                request: {
                    "Accept": "*/*",
                    "If-None-Match": "W/\"123456789\""
                },
                response: {
                    "Content-Type": "application/javascript",
                    "Age": "1205"
                }
            },
            {
                id: 4,
                type_icon: '#',
                type_color: 'text-purple-400',
                host_url: "https://chatgpt.com",
                path: "/css/conversation-small.css",
                from: "Index HTML",
                to: "Static Server",
                http_status: 200,
                http_method: "GET",
                request: {
                    "Accept": "text/css,*/*;q=0.1"
                },
                response: {
                    "Content-Type": "text/css",
                    "Content-Encoding": "br"
                }
            }
        ];

        let activeId = null;

        // 2. Render Left Panel
        function renderList() {
            const listContainer = document.getElementById('network-list');
            listContainer.innerHTML = '';

            networkLogs.forEach(log => {
                const isSelected = log.id === activeId;
                
                // Construct list item
                const div = document.createElement('div');
                div.className = `flex items-center px-3 py-1 cursor-pointer truncate whitespace-nowrap ${
                    isSelected ? 'bg-[#1a3a5c] text-white' : 'hover:bg-[#333]'
                }`;
                
                div.onclick = () => {
                    activeId = log.id;
                    renderList();
                    renderDetails(log);
                };

                div.innerHTML = `
                    <span class="${log.type_color} w-5 font-bold mr-2 text-xs flex-shrink-0">${log.type_icon}</span>
                    <span class="truncate" title="${log.path}">${log.path}</span>
                `;
                
                listContainer.appendChild(div);
            });
        }

        // 3. Render Right Panel Details
        function renderDetails(log) {
            const detailsContainer = document.getElementById('network-details');
            
            // Helper to render key-value objects
            const renderObject = (obj) => {
                return Object.entries(obj).map(([key, value]) => `
                    <div class="flex py-[2px]">
                        <span class="font-semibold text-[#c792ea] w-1/3 break-words pr-2">${key}:</span>
                        <span class="w-2/3 break-all text-[#a6accd]">${value}</span>
                    </div>
                `).join('');
            };

            detailsContainer.innerHTML = `
                <details open class="border-b border-[#444]">
                    <summary class="px-2 py-1.5 cursor-pointer bg-[#2a2a2a] hover:bg-[#333] border-b border-[#444] font-semibold text-[#eee]">General</summary>
                    <div class="p-3 font-mono text-[12px] bg-[#242424]">
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Request URL:</span>
                            <span class="w-2/3 break-all">${log.host_url}${log.path}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Request Method:</span>
                            <span class="w-2/3">${log.http_method}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Status Code:</span>
                            <span class="w-2/3 flex items-center gap-2">
                                <span class="w-3 h-3 rounded-full ${log.http_status < 400 ? 'bg-green-500' : 'bg-red-500'}"></span>
                                ${log.http_status}
                            </span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">From:</span>
                            <span class="w-2/3">${log.from}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">To:</span>
                            <span class="w-2/3">${log.to}</span>
                        </div>
                    </div>
                </details>

                <details open class="border-b border-[#444]">
                    <summary class="px-2 py-1.5 cursor-pointer bg-[#2a2a2a] hover:bg-[#333] border-b border-[#444] font-semibold text-[#eee]">Response Headers</summary>
                    <div class="p-3 font-mono text-[12px] bg-[#242424]">
                        ${renderObject(log.response)}
                    </div>
                </details>

                <details open class="border-b border-[#444]">
                    <summary class="px-2 py-1.5 cursor-pointer bg-[#2a2a2a] hover:bg-[#333] border-b border-[#444] font-semibold text-[#eee]">Request Headers</summary>
                    
                    ${log.http_status === 101 ? `
                    <div class="mx-3 mt-3 p-2 bg-[#3c3418] border border-[#6b5a29] text-[#e8c156] rounded-sm flex items-center gap-2">
                        <span>⚠️</span>
                        <span>Provisional headers are shown. <a href="#" class="underline text-[#8ab4f8]">Learn more</a></span>
                    </div>
                    ` : ''}

                    <div class="p-3 font-mono text-[12px] bg-[#242424]">
                        ${renderObject(log.request)}
                    </div>
                </details>
            `;
        }

        // Initialize
        renderList();
        
        // Optionally select the first item on load
        if(networkLogs.length > 0) {
            activeId = networkLogs[0].id;
            renderList();
            renderDetails(networkLogs[0]);
        }
    </script>
</body>
</html>
