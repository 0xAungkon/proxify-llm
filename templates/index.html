<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
        // Initialize theme immediately to prevent flash
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    <style>
        /* Theme CSS Variables */
        :root[data-theme="dark"] {
            --bg-primary: #242424;
            --bg-secondary: #202124;
            --bg-tertiary: #2a2a2a;
            --text-primary: #cccccc;
            --text-secondary: #888888;
            --text-tertiary: #555555;
            --border-color: #444444;
            --border-secondary: #3a3a3a;
            --highlight-color: #8ab4f8;
            --success-color: #6fcf97;
            --warning-color: #ffd700;
            --danger-color: #f28b82;
            --hover-bg: #3a3a3a;
            --active-bg-danger: #3a1a1a;
            --active-bg-danger-light: #2b1b1b;
            --scrollbar-thumb: #555;
            --scrollbar-track: #242424;
        }

        :root[data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafafa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --text-tertiary: #999999;
            --border-color: #e0e0e0;
            --border-secondary: #d0d0d0;
            --highlight-color: #1976d2;
            --success-color: #4caf50;
            --warning-color: #ff9800;
            --danger-color: #f44336;
            --hover-bg: #f0f0f0;
            --active-bg-danger: #ffebee;
            --active-bg-danger-light: #ffcdd2;
            --scrollbar-thumb: #c0c0c0;
            --scrollbar-track: #f5f5f5;
        }

        /* Custom scrollbar with theme support */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb); 
            border: 2px solid var(--scrollbar-track);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #999; 
        }
        
        /* Triangle indicator for details tags */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary::before {
            content: '▶';
            font-size: 8px;
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.1s ease-in-out;
        }
        details[open] > summary::before {
            transform: rotate(90deg);
        }

        /* Resizer active state */
        #sidebar-resizer.active { background: #8ab4f8; }

        /* Context menu — never inherits select-none */
        #ctx-menu { user-select: none; }

        /* Theme-aware body and main elements */
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #sidebar-panel {
            background-color: var(--bg-secondary);
            border-right-color: var(--border-color);
        }

        #sidebar-resizer {
            background-color: var(--text-tertiary);
        }

        #sidebar-resizer:hover {
            background-color: var(--highlight-color);
        }

        input, select, button {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-secondary);
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: var(--text-tertiary);
        }

        input:focus, select:focus {
            border-color: var(--highlight-color);
        }

        .border-b, .border-r, .border-t {
            border-color: var(--border-color) !important;
        }

        .text-\[\#888\], .text-\[\#777\], .text-\[\#555\], .text-\[\#666\] {
            color: var(--text-secondary) !important;
        }

        .bg-\[\#242424\], .bg-\[\#202124\], .bg-\[\#2a2a2a\], .bg-\[\#1e1e1e\] {
            background-color: var(--bg-tertiary) !important;
        }

        .text-\[\#8ab4f8\] {
            color: var(--highlight-color) !important;
        }

        /* Light mode text colors */
        :root[data-theme="light"] .text-\[\#cccccc\],
        :root[data-theme="light"] .text-\[\#eee\],
        :root[data-theme="light"] .text-\[\#ccc\] {
            color: #000000 !important;
        }

        :root[data-theme="light"] .text-\[\#888\],
        :root[data-theme="light"] .text-\[\#777\],
        :root[data-theme="light"] .text-\[\#666\],
        :root[data-theme="light"] .text-\[\#aaa\] {
            color: #333333 !important;
        }

        /* Request and Response text in light mode */
        :root[data-theme="light"] pre,
        :root[data-theme="light"] .whitespace-pre-wrap {
            color: #000000 !important;
        }

        /* Light mode sidebar text colors */
        :root[data-theme="light"] #network-list {
            color: #000000 !important;
        }

        :root[data-theme="light"] #network-list .text-\[\#cccccc\] {
            color: #000000 !important;
        }

        :root[data-theme="light"] #network-list .text-\[\#888\] {
            color: #666666 !important;
        }

        :root[data-theme="light"] #network-list .text-\[\#b9c1cc\] {
            color: #332222 !important;
        }

        /* HTTP method colors in light mode */
        :root[data-theme="light"] .bg-\[\#1a4d2e\] {
            background-color: #c8e6c9 !important;
            color: #2e7d32 !important;
        }

        :root[data-theme="light"] .bg-\[\#1a2f4d\] {
            background-color: #bbdefb !important;
            color: #1565c0 !important;
        }

        :root[data-theme="light"] .bg-\[\#4d3d1a\] {
            background-color: #fff9c4 !important;
            color: #f57f17 !important;
        }

        :root[data-theme="light"] .bg-\[\#3d1a4d\] {
            background-color: #f3e5f5 !important;
            color: #7b1fa2 !important;
        }

        :root[data-theme="light"] .bg-\[\#4d1a1a\] {
            background-color: #ffcdd2 !important;
            color: #c62828 !important;
        }

        /* Sidebar item hover effect */
        :root[data-theme="light"] #network-list > div:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }

        :root[data-theme="light"] #network-list > div[class*="bg-\[\#1a3a5c\]"] {
            background-color: rgba(0, 0, 0, 0.08) !important;
        }

        /* Tree view folder hover effect in light mode */
        :root[data-theme="light"] .hover\:bg-\[\#2a2a2a\]:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }

        :root[data-theme="light"] .bg-\[\#1a3a5c\] {
            background-color: rgba(0, 0, 0, 0.08) !important;
        }

        /* Light mode folder text colors */
        :root[data-theme="light"] .text-\[\#b9c1cc\] {
            color: #333333 !important;
        }

        /* Light mode sidebar text colors */
        :root[data-theme="light"] .text-\[\#cccccc\][title] {
            color: #000000 !important;
        }

        :root[data-theme="light"] .hover\:bg-\[\#2a2a2a\]:hover {
            background-color: rgba(0, 0, 0, 0.05) !important;
        }

        .border-\[\#444\], .border-\[\#3a3a3a\] {
            border-color: var(--border-secondary) !important;
        }

        /* Light mode button and interactive hover effects */
        :root[data-theme="light"] .hover\:text-\[\#c6dcff\]:hover {
            color: #1976d2 !important;
        }

        :root[data-theme="light"] .hover\:border-\[\#8ab4f8\]:hover {
            border-color: #1976d2 !important;
        }

        :root[data-theme="light"] .hover\:text-\[\#f28b82\]:hover {
            color: #d32f2f !important;
        }

        :root[data-theme="light"] .hover\:bg-\[\#3a1a1a\]:hover {
            background-color: #ffebee !important;
        }

        :root[data-theme="light"] .hover\:bg-\[\#2a2a2a\]:hover {
            background-color: rgba(0, 0, 0, 0.08) !important;
        }

        :root[data-theme="light"] .hover\:bg-\[\#333333\]:hover {
            background-color: rgba(0, 0, 0, 0.08) !important;
        }

        :root[data-theme="light"] .hover\:text-\[\#eee\]:hover {
            color: #000000 !important;
        }

        :root[data-theme="light"] .hover\:text-\[\#3a3a3a\] {
            color: rgba(0, 0, 0, 0.1) !important;
        }

        :root[data-theme="light"] .hover\:text-\[\#ffd700\]:hover {
            color: #ff9800 !important;
        }

        :root[data-theme="light"] .hover\:bg-\[\#094771\]:hover {
            background-color: rgba(25, 118, 210, 0.1) !important;
        }

        :root[data-theme="light"] .hover\:text-\[\#ccc\]:hover {
            color: #000000 !important;
        }

        /* Light mode focus effects */
        :root[data-theme="light"] .focus\:border-\[\#8ab4f8\]:focus {
            border-color: #1976d2 !important;
        }

        :root[data-theme="light"] .focus\:ring-\[\#8ab4f8\]:focus {
            --tw-ring-color: rgba(25, 118, 210, 0.5) !important;
        }

        /* Light mode tab buttons */
        :root[data-theme="light"] .tab-btn.text-\[\#8ab4f8\].border-\[\#8ab4f8\] {
            color: #1976d2 !important;
            border-bottom-color: #1976d2 !important;
        }

        :root[data-theme="light"] .tab-btn.text-\[\#aaa\]:hover {
            color: #000000 !important;
        }

        /* Light mode context menu */
        :root[data-theme="light"] #ctx-menu {
            background-color: #ffffff !important;
            border-color: var(--border-color) !important;
        }

        :root[data-theme="light"] .ctx-item {
            color: #000000 !important;
        }

        :root[data-theme="light"] .ctx-item:hover {
            background-color: rgba(25, 118, 210, 0.1) !important;
        }

        :root[data-theme="light"] .ctx-item.text-\[\#6fcf97\] {
            color: #4caf50 !important;
        }

        :root[data-theme="light"] .ctx-item.text-\[\#c792ea\] {
            color: #7b1fa2 !important;
        }

        :root[data-theme="light"] .ctx-item.text-\[\#f28b82\] {
            color: #d32f2f !important;
        }

        :root[data-theme="light"] .ctx-item.text-\[\#f28b82\]:hover {
            background-color: #ffebee !important;
        }

        :root[data-theme="light"] .border-\[\#454545\] {
            border-color: var(--border-color) !important;
        }

        /* Light mode filter menus */
        :root[data-theme="light"] #filter-method-menu,
        :root[data-theme="light"] #filter-status-menu {
            background-color: #ffffff !important;
            border-color: var(--border-color) !important;
        }

        :root[data-theme="light"] #filter-method-menu label,
        :root[data-theme="light"] #filter-status-menu label {
            color: #000000 !important;
        }
    </style>
</head>
<body class="bg-[#242424] text-[#cccccc] font-sans text-[13px] h-screen flex flex-col overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        
        <div id="sidebar-panel" class="border-r border-[#444] flex flex-col bg-[#202124] flex-shrink-0 min-w-[180px] select-none" style="width:42%">
            <!-- Sticky search + clear all -->
            <div class="border-b border-[#444] px-2 py-1.5 flex items-center gap-1.5 flex-shrink-0 bg-[#202124]">
                <button id="refresh-now-btn" title="Refresh logs now"
                    class="flex-shrink-0 px-2 py-[3px] rounded border border-[#3a3a3a] bg-[#2a2a2a] text-[#8ab4f8] text-[10px] hover:text-[#c6dcff] hover:border-[#8ab4f8] transition-colors">
                    <span id="refresh-countdown">10</span>s
                </button>
                <div class="flex-1 flex items-center gap-1.5 bg-[#2a2a2a] border border-[#3a3a3a] rounded px-2 py-[3px] focus-within:border-[#8ab4f8] transition-colors">
                    <i data-lucide="search" class="w-3 h-3 text-[#666] flex-shrink-0"></i>
                    <input id="sidebar-search" type="text" placeholder="Search path..."
                        oninput="applyFilters()"
                        class="flex-1 bg-transparent text-[#ccc] text-[11px] placeholder-[#555] focus:outline-none min-w-0">
                    <button id="search-clear-btn" onclick="clearSearch()" class="hidden text-[#666] hover:text-[#ccc] flex-shrink-0">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
                <button onclick="clearAllLogs()" title="Clear all logs"
                    class="flex-shrink-0 p-1 rounded text-[#888] hover:text-[#f28b82] hover:bg-[#3a1a1a] border border-[#3a3a3a] transition-colors">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
                <button id="sidebar-view-toggle" onclick="toggleSidebarView()" title="Switch to Tree view"
                    class="flex-shrink-0 px-2 py-[3px] rounded border border-[#3a3a3a] bg-[#2a2a2a] text-[#9aa0a6] text-[10px] hover:text-[#c6dcff] hover:border-[#8ab4f8] transition-colors">
                    Tree
                </button>
            </div>
            <!-- Column headers -->
            <div class="border-b border-[#444] px-2 py-1 font-semibold text-[10px] uppercase tracking-wide text-[#888] flex items-center gap-2 flex-shrink-0">
                <span class="w-14 flex-shrink-0">Method</span>
                <span class="flex-1 truncate">Path</span>
                <span class="w-8 text-right flex-shrink-0">Code</span>
                <span class="w-[6.5rem] text-right flex-shrink-0 pr-1">Time</span>
            </div>
            <div id="network-list" class="flex-1 overflow-y-auto outline-none" tabindex="0"></div>
        </div>

        <!-- Draggable resizer -->
        <div id="sidebar-resizer" class="w-[4px] cursor-col-resize bg-[#383838] hover:bg-[#8ab4f8] flex-shrink-0 transition-colors"></div>

        <div class="flex-1 flex flex-col bg-[#242424] min-w-0 overflow-hidden">
            <!-- Filter bar -->
            <div class="flex items-center gap-2 px-3 py-1.5 border-b border-[#3a3a3a] bg-[#1e1e1e] flex-shrink-0 flex-wrap">
                <!-- Method -->
                <div class="relative" id="filter-method-wrap">
                    <button type="button" id="filter-method-btn" onclick="toggleFilterMenu('method', event)"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] min-w-[110px] text-left hover:border-[#8ab4f8] transition-colors">
                        Method: All
                    </button>
                    <div id="filter-method-menu" class="hidden absolute z-40 mt-1 bg-[#2a2a2a] border border-[#3a3a3a] rounded p-1.5 min-w-[130px]">
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="GET" onchange="applyFilters()">GET</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="POST" onchange="applyFilters()">POST</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="PUT" onchange="applyFilters()">PUT</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="PATCH" onchange="applyFilters()">PATCH</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="DELETE" onchange="applyFilters()">DELETE</label>
                    </div>
                </div>
                <!-- Status -->
                <div class="relative" id="filter-status-wrap">
                    <button type="button" id="filter-status-btn" onclick="toggleFilterMenu('status', event)"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] min-w-[105px] text-left hover:border-[#8ab4f8] transition-colors">
                        Status: All
                    </button>
                    <div id="filter-status-menu" class="hidden absolute z-40 mt-1 bg-[#2a2a2a] border border-[#3a3a3a] rounded p-1.5 min-w-[120px]">
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="2" onchange="applyFilters()">2xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="3" onchange="applyFilters()">3xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="4" onchange="applyFilters()">4xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="5" onchange="applyFilters()">5xx</label>
                    </div>
                </div>
                <!-- Time range -->
                <select id="filter-time" onchange="onTimeRangeChange()"
                    class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] cursor-pointer focus:outline-none focus:border-[#8ab4f8] transition-colors">
                    <option value="">All Time</option>
                    <option value="1m">Last 1 minute</option>
                    <option value="5m">Last 5 minutes</option>
                    <option value="15m">Last 15 minutes</option>
                    <option value="30m">Last 30 minutes</option>
                    <option value="1h">Last 1 hour</option>
                    <option value="custom">Custom range</option>
                </select>
                <!-- Custom date pickers -->
                <div id="custom-date-range" class="hidden items-center gap-1">
                    <input type="datetime-local" id="filter-date-from" onchange="applyFilters()"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] focus:outline-none focus:border-[#8ab4f8]">
                    <span class="text-[#555] text-[11px]">&#8594;</span>
                    <input type="datetime-local" id="filter-date-to" onchange="applyFilters()"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] focus:outline-none focus:border-[#8ab4f8]">
                </div>
                <!-- Clear filters -->
                <button id="clear-filters-btn" onclick="clearFilters()" style="display:none"
                    class="ml-auto flex items-center gap-1 text-[11px] text-[#f6c90e] hover:text-[#eee] transition-colors">
                    <i data-lucide="filter-x" class="w-3 h-3"></i>
                    Clear filters
                </button>
            </div>

            <!-- Tab bar -->
            <div id="tab-bar" class="flex border-b border-[#444] px-2 pt-1 gap-5 text-[13px] flex-shrink-0">
                <button onclick="switchTab('overview')" data-tab="overview" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#8ab4f8] border-[#8ab4f8]">Overview</button>
                <button onclick="switchTab('request')"  data-tab="request"  class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Request</button>
                <button onclick="switchTab('response')" data-tab="response" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Response</button>
            </div>

            <div id="network-details" class="flex-1 overflow-y-auto select-text">
                <div class="flex h-full items-center justify-center text-[#777]">
                    Select a log entry to view details
                </div>
            </div>
        </div>
    </div>

    <div class="h-7 border-t border-[#444] bg-[#202124] flex items-center px-3 gap-4 text-[#888] text-xs">
        <span id="log-count">0 logs</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>Copyright © 2026 0xAungkon. All rights reserved.</span>
        <button id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme" class="ml-auto p-1 rounded text-[#888] hover:text-[#ffd700] hover:bg-[#333333] border border-[#3a3a3a] transition-colors">
            <i id="theme-icon" data-lucide="moon" class="w-4 h-4"></i>
        </button>
        <button id="logout-btn" onclick="handleLogout()" title="Logout" class="p-1 rounded text-[#888] hover:text-[#f28b82] hover:bg-[#3a1a1a] border border-[#3a3a3a] transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
    </div>

    <script type="module" src="/static/js/app.js"></script>
    <script>
        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function applyTheme(theme) {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            
            if (theme === 'light') {
                html.setAttribute('data-theme', 'light');
                html.classList.add('light-mode');
                html.classList.remove('dark-mode');
                icon.setAttribute('data-lucide', 'sun');
            } else {
                html.setAttribute('data-theme', 'dark');
                html.classList.add('dark-mode');
                html.classList.remove('light-mode');
                icon.setAttribute('data-lucide', 'moon');
            }
            
            if (window.lucide) {
                window.lucide.createIcons();
            }
        }

        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            applyTheme(savedTheme);
        }

        async function handleLogout() {
           
            window.location.href = '/app/logout';
        }

        // Initialize theme when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeTheme);
        // Also call it immediately in case DOM is already ready
        if (document.readyState !== 'loading') {
            initializeTheme();
        }
    </script>

    <!-- Right-click context menu -->
    <div id="ctx-menu" class="hidden fixed z-50 bg-[#252526] border border-[#454545] rounded-md shadow-2xl py-1 text-[12px]" style="min-width:175px">
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="view">
            <span class="text-[#888] w-3.5 text-center">⊙</span> View Details
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="curl">
            <span class="text-[#888] w-3.5 text-center">⧉</span> Copy cURL
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="copy">
            <span class="text-[#888] w-3.5 text-center">⎘</span> Copy Log JSON
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#6fcf97]" data-action="download">
            <span class="w-3.5 text-center">↓</span> Download
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#c792ea]" data-action="replay">
