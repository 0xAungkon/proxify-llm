<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        /* Custom scrollbar to match DevTools aesthetic */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #242424; 
        }
        ::-webkit-scrollbar-thumb {
            background: #555; 
            border: 2px solid #242424;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }
        
        /* Triangle indicator for details tags */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary::before {
            content: '▶';
            font-size: 8px;
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.1s ease-in-out;
        }
        details[open] > summary::before {
            transform: rotate(90deg);
        }

        /* Resizer active state */
        #sidebar-resizer.active { background: #8ab4f8; }

        /* Context menu — never inherits select-none */
        #ctx-menu { user-select: none; }
    </style>
</head>
<body class="bg-[#242424] text-[#cccccc] font-sans text-[13px] h-screen flex flex-col overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        
        <div id="sidebar-panel" class="border-r border-[#444] flex flex-col bg-[#202124] flex-shrink-0 min-w-[180px] select-none" style="width:42%">
            <!-- Sticky search + clear all -->
            <div class="border-b border-[#444] px-2 py-1.5 flex items-center gap-1.5 flex-shrink-0 bg-[#202124]">
                <button id="refresh-now-btn" title="Refresh logs now"
                    class="flex-shrink-0 px-2 py-[3px] rounded border border-[#3a3a3a] bg-[#2a2a2a] text-[#8ab4f8] text-[10px] hover:text-[#c6dcff] hover:border-[#8ab4f8] transition-colors">
                    <span id="refresh-countdown">10</span>s
                </button>
                <div class="flex-1 flex items-center gap-1.5 bg-[#2a2a2a] border border-[#3a3a3a] rounded px-2 py-[3px] focus-within:border-[#8ab4f8] transition-colors">
                    <i data-lucide="search" class="w-3 h-3 text-[#666] flex-shrink-0"></i>
                    <input id="sidebar-search" type="text" placeholder="Search path..."
                        oninput="applyFilters()"
                        class="flex-1 bg-transparent text-[#ccc] text-[11px] placeholder-[#555] focus:outline-none min-w-0">
                    <button id="search-clear-btn" onclick="clearSearch()" class="hidden text-[#666] hover:text-[#ccc] flex-shrink-0">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
                <button onclick="clearAllLogs()" title="Clear all logs"
                    class="flex-shrink-0 p-1 rounded text-[#888] hover:text-[#f28b82] hover:bg-[#3a1a1a] border border-[#3a3a3a] transition-colors">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
                <button id="sidebar-view-toggle" onclick="toggleSidebarView()" title="Switch to Tree view"
                    class="flex-shrink-0 px-2 py-[3px] rounded border border-[#3a3a3a] bg-[#2a2a2a] text-[#9aa0a6] text-[10px] hover:text-[#c6dcff] hover:border-[#8ab4f8] transition-colors">
                    Tree
                </button>
            </div>
            <!-- Column headers -->
            <div class="border-b border-[#444] px-2 py-1 font-semibold text-[10px] uppercase tracking-wide text-[#888] flex items-center gap-2 flex-shrink-0">
                <span class="w-14 flex-shrink-0">Method</span>
                <span class="flex-1 truncate">Path</span>
                <span class="w-8 text-right flex-shrink-0">Code</span>
                <span class="w-[6.5rem] text-right flex-shrink-0 pr-1">Time</span>
            </div>
            <div id="network-list" class="flex-1 overflow-y-auto outline-none" tabindex="0"></div>
        </div>

        <!-- Draggable resizer -->
        <div id="sidebar-resizer" class="w-[4px] cursor-col-resize bg-[#383838] hover:bg-[#8ab4f8] flex-shrink-0 transition-colors"></div>

        <div class="flex-1 flex flex-col bg-[#242424] min-w-0 overflow-hidden">
            <!-- Filter bar -->
            <div class="flex items-center gap-2 px-3 py-1.5 border-b border-[#3a3a3a] bg-[#1e1e1e] flex-shrink-0 flex-wrap">
                <!-- Method -->
                <div class="relative" id="filter-method-wrap">
                    <button type="button" id="filter-method-btn" onclick="toggleFilterMenu('method', event)"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] min-w-[110px] text-left hover:border-[#8ab4f8] transition-colors">
                        Method: All
                    </button>
                    <div id="filter-method-menu" class="hidden absolute z-40 mt-1 bg-[#2a2a2a] border border-[#3a3a3a] rounded p-1.5 min-w-[130px]">
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="GET" onchange="applyFilters()">GET</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="POST" onchange="applyFilters()">POST</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="PUT" onchange="applyFilters()">PUT</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="PATCH" onchange="applyFilters()">PATCH</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="method-opt" value="DELETE" onchange="applyFilters()">DELETE</label>
                    </div>
                </div>
                <!-- Status -->
                <div class="relative" id="filter-status-wrap">
                    <button type="button" id="filter-status-btn" onclick="toggleFilterMenu('status', event)"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] min-w-[105px] text-left hover:border-[#8ab4f8] transition-colors">
                        Status: All
                    </button>
                    <div id="filter-status-menu" class="hidden absolute z-40 mt-1 bg-[#2a2a2a] border border-[#3a3a3a] rounded p-1.5 min-w-[120px]">
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="2" onchange="applyFilters()">2xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="3" onchange="applyFilters()">3xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="4" onchange="applyFilters()">4xx</label>
                        <label class="flex items-center gap-1.5 px-1 py-0.5 text-[11px] cursor-pointer"><input type="checkbox" class="status-opt" value="5" onchange="applyFilters()">5xx</label>
                    </div>
                </div>
                <!-- Time range -->
                <select id="filter-time" onchange="onTimeRangeChange()"
                    class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] cursor-pointer focus:outline-none focus:border-[#8ab4f8] transition-colors">
                    <option value="">All Time</option>
                    <option value="1m">Last 1 minute</option>
                    <option value="5m">Last 5 minutes</option>
                    <option value="15m">Last 15 minutes</option>
                    <option value="30m">Last 30 minutes</option>
                    <option value="1h">Last 1 hour</option>
                    <option value="custom">Custom range</option>
                </select>
                <!-- Custom date pickers -->
                <div id="custom-date-range" class="hidden items-center gap-1">
                    <input type="datetime-local" id="filter-date-from" onchange="applyFilters()"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] focus:outline-none focus:border-[#8ab4f8]">
                    <span class="text-[#555] text-[11px]">&#8594;</span>
                    <input type="datetime-local" id="filter-date-to" onchange="applyFilters()"
                        class="bg-[#2a2a2a] border border-[#3a3a3a] text-[#ccc] rounded px-2 py-[3px] text-[11px] focus:outline-none focus:border-[#8ab4f8]">
                </div>
                <!-- Clear filters -->
                <button id="clear-filters-btn" onclick="clearFilters()" style="display:none"
                    class="ml-auto flex items-center gap-1 text-[11px] text-[#f6c90e] hover:text-[#eee] transition-colors">
                    <i data-lucide="filter-x" class="w-3 h-3"></i>
                    Clear filters
                </button>
            </div>

            <!-- Tab bar -->
            <div id="tab-bar" class="flex border-b border-[#444] px-2 pt-1 gap-5 text-[13px] flex-shrink-0">
                <button onclick="switchTab('overview')" data-tab="overview" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#8ab4f8] border-[#8ab4f8]">Overview</button>
                <button onclick="switchTab('request')"  data-tab="request"  class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Request</button>
                <button onclick="switchTab('response')" data-tab="response" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Response</button>
            </div>

            <div id="network-details" class="flex-1 overflow-y-auto select-text">
                <div class="flex h-full items-center justify-center text-[#777]">
                    Select a log entry to view details
                </div>
            </div>
        </div>
    </div>

    <div class="h-7 border-t border-[#444] bg-[#202124] flex items-center px-3 gap-4 text-[#888] text-xs">
        <span id="log-count">0 logs</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>Copyright © 2026 0xAungkon. All rights reserved.</span>
        <button id="logout-btn" onclick="window.location.href='/app/logout'" title="Logout" class="ml-auto p-1 rounded text-[#888] hover:text-[#f28b82] hover:bg-[#3a1a1a] border border-[#3a3a3a] transition-colors">
            <i data-lucide="log-out" class="w-4 h-4"></i>
        </button>
    </div>

    <script type="module" src="/static/js/app.js"></script>

    <!-- Right-click context menu -->
    <div id="ctx-menu" class="hidden fixed z-50 bg-[#252526] border border-[#454545] rounded-md shadow-2xl py-1 text-[12px]" style="min-width:175px">
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="view">
            <span class="text-[#888] w-3.5 text-center">⊙</span> View Details
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="curl">
            <span class="text-[#888] w-3.5 text-center">⧉</span> Copy cURL
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#ccc]" data-action="copy">
            <span class="text-[#888] w-3.5 text-center">⎘</span> Copy Log JSON
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#6fcf97]" data-action="download">
            <span class="w-3.5 text-center">↓</span> Download
        </div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#094771] cursor-pointer text-[#c792ea]" data-action="replay">
            <span class="w-3.5 text-center">▶</span> Replay
        </div>
        <div class="border-t border-[#454545] my-1"></div>
        <div class="ctx-item flex items-center gap-2.5 px-3 py-[6px] hover:bg-[#3a1a1a] cursor-pointer text-[#f28b82]" data-action="delete">
            <span class="w-3.5 text-center">✕</span> Delete Log
        </div>
    </div>
</body>
</html>
