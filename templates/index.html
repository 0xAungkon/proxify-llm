<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to match DevTools aesthetic */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #242424; 
        }
        ::-webkit-scrollbar-thumb {
            background: #555; 
            border: 2px solid #242424;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }
        
        /* Triangle indicator for details tags */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary::before {
            content: '▶';
            font-size: 8px;
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.1s ease-in-out;
        }
        details[open] > summary::before {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-[#242424] text-[#cccccc] font-sans text-[13px] h-screen flex flex-col overflow-hidden select-none">

    <div class="flex flex-1 overflow-hidden">
        
        <div class="w-1/3 border-r border-[#444] flex flex-col bg-[#202124]">
            <div class="border-b border-[#444] px-3 py-1 font-semibold text-[#eee] flex items-center shadow-sm">
                Log Files
            </div>
            <div id="network-list" class="flex-1 overflow-y-auto outline-none" tabindex="0">
                </div>
        </div>

        <div class="flex-1 flex flex-col bg-[#242424]">
            
            <div class="flex border-b border-[#444] px-2 pt-1 gap-5 text-[13px]">
                <div class="flex items-center justify-center cursor-pointer pb-1 text-[#8ab4f8] border-b-2 border-[#8ab4f8]">Log Viewer</div>
            </div>

            <div id="network-details" class="flex-1 overflow-y-auto">
                <div class="flex h-full items-center justify-center text-[#777]">
                    Select a log file to view details
                </div>
            </div>

        </div>
    </div>

    <div class="h-7 border-t border-[#444] bg-[#202124] flex items-center px-3 gap-4 text-[#888] text-xs">
        <span id="log-count">0 logs</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>Protected admin dashboard</span>
    </div>

    <script>
        let logFiles = [];
        let activePath = null;

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function buildLogUrl(relativePath) {
            return `/admin/logs/${relativePath.split('/').map(encodeURIComponent).join('/')}`;
        }

        function renderList() {
            const listContainer = document.getElementById('network-list');
            listContainer.innerHTML = '';

            if (!logFiles.length) {
                listContainer.innerHTML = `
                    <div class="px-3 py-3 text-[#777]">No log files available.</div>
                `;
                return;
            }

            logFiles.forEach(log => {
                const isSelected = log.relative_path === activePath;
                
                const div = document.createElement('div');
                div.className = `flex items-center px-3 py-1 cursor-pointer truncate whitespace-nowrap ${
                    isSelected ? 'bg-[#1a3a5c] text-white' : 'hover:bg-[#333]'
                }`;
                
                div.onclick = () => {
                    activePath = log.relative_path;
                    renderList();
                    loadLogDetails(log.relative_path);
                };

                div.innerHTML = `
                    <span class="text-[#8ab4f8] w-5 font-bold mr-2 text-xs flex-shrink-0">LOG</span>
                    <span class="truncate" title="${escapeHtml(log.relative_path)}">${escapeHtml(log.file_name)}</span>
                `;
                
                listContainer.appendChild(div);
            });
        }

        function renderDetails(log) {
            const detailsContainer = document.getElementById('network-details');

            detailsContainer.innerHTML = `
                <details open class="border-b border-[#444]">
                    <summary class="px-2 py-1.5 cursor-pointer bg-[#2a2a2a] hover:bg-[#333] border-b border-[#444] font-semibold text-[#eee]">General</summary>
                    <div class="p-3 font-mono text-[12px] bg-[#242424]">
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">File Name:</span>
                            <span class="w-2/3 break-all">${escapeHtml(log.file_name)}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Relative Path:</span>
                            <span class="w-2/3 break-all">${escapeHtml(log.relative_path)}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Full Path:</span>
                            <span class="w-2/3 break-all">${escapeHtml(log.full_path)}</span>
                        </div>
                        <div class="flex py-[2px]">
                            <span class="font-semibold text-[#8ab4f8] w-1/3 pr-2">Modified:</span>
                            <span class="w-2/3">${escapeHtml(log.date)}</span>
                        </div>
                    </div>
                </details>

                <details open class="border-b border-[#444]">
                    <summary class="px-2 py-1.5 cursor-pointer bg-[#2a2a2a] hover:bg-[#333] border-b border-[#444] font-semibold text-[#eee]">Content</summary>
                    <div class="p-3 font-mono text-[12px] bg-[#242424] overflow-auto">
                        <pre class="whitespace-pre-wrap break-words text-[#a6accd]">${escapeHtml(log.content || '')}</pre>
                    </div>
                </details>
            `;
        }

        function renderError(message) {
            document.getElementById('network-details').innerHTML = `
                <div class="flex h-full items-center justify-center px-6 text-[#f28b82] text-center">
                    ${escapeHtml(message)}
                </div>
            `;
        }

        async function loadLogs() {
            try {
                const response = await fetch('/admin/logs', { credentials: 'same-origin' });

                if (response.status === 401) {
                    window.location.href = '/app/login';
                    return;
                }

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to load logs.');
                }

                logFiles = data.logs || [];
                document.getElementById('log-count').textContent = `${logFiles.length} logs`;
                renderList();

                if (logFiles.length > 0) {
                    activePath = logFiles[0].relative_path;
                    renderList();
                    await loadLogDetails(activePath);
                    return;
                }

                renderError('No log files found.');
            } catch (error) {
                renderError(error.message || 'Unable to load logs.');
            }
        }

        async function loadLogDetails(relativePath) {
            try {
                const response = await fetch(buildLogUrl(relativePath), { credentials: 'same-origin' });

                if (response.status === 401) {
                    window.location.href = '/app/login';
                    return;
                }

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to load log details.');
                }

                renderDetails(data.log);
            } catch (error) {
                renderError(error.message || 'Unable to load log details.');
            }
        }

        loadLogs();
    </script>
</body>
</html>
