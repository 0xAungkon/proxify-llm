<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar to match DevTools aesthetic */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #242424; 
        }
        ::-webkit-scrollbar-thumb {
            background: #555; 
            border: 2px solid #242424;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #777; 
        }
        
        /* Triangle indicator for details tags */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
        details > summary::before {
            content: '▶';
            font-size: 8px;
            display: inline-block;
            margin-right: 6px;
            transition: transform 0.1s ease-in-out;
        }
        details[open] > summary::before {
            transform: rotate(90deg);
        }
    </style>
</head>
<body class="bg-[#242424] text-[#cccccc] font-sans text-[13px] h-screen flex flex-col overflow-hidden select-none">

    <div class="flex flex-1 overflow-hidden">
        
        <div class="w-[42%] border-r border-[#444] flex flex-col bg-[#202124]">
            <!-- Sidebar column headers -->
            <div class="border-b border-[#444] px-2 py-1 font-semibold text-[10px] uppercase tracking-wide text-[#888] flex items-center gap-2 flex-shrink-0">
                <span class="w-14 flex-shrink-0">Method</span>
                <span class="flex-1 truncate">Path</span>
                <span class="w-8 text-right flex-shrink-0">Code</span>
                <span class="w-[6.5rem] text-right flex-shrink-0 pr-1">Time</span>
            </div>
            <div id="network-list" class="flex-1 overflow-y-auto outline-none" tabindex="0"></div>
        </div>

        <div class="flex-1 flex flex-col bg-[#242424] min-w-0">
            <!-- Tab bar -->
            <div id="tab-bar" class="flex border-b border-[#444] px-2 pt-1 gap-5 text-[13px] flex-shrink-0">
                <button onclick="switchTab('overview')" data-tab="overview" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#8ab4f8] border-[#8ab4f8]">Overview</button>
                <button onclick="switchTab('request')"  data-tab="request"  class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Request</button>
                <button onclick="switchTab('response')" data-tab="response" class="tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 text-[#aaa] border-transparent hover:text-[#eee]">Response</button>
            </div>

            <div id="network-details" class="flex-1 overflow-y-auto">
                <div class="flex h-full items-center justify-center text-[#777]">
                    Select a log entry to view details
                </div>
            </div>
        </div>
    </div>

    <div class="h-7 border-t border-[#444] bg-[#202124] flex items-center px-3 gap-4 text-[#888] text-xs">
        <span id="log-count">0 logs</span>
        <span class="w-px h-3 bg-[#444]"></span>
        <span>Copyright © 2026 0xAungkon. All rights reserved.</span>
    </div>

    <script>
        let logFiles    = [];
        let activePath  = null;
        let activeTab   = 'overview';
        let currentLog  = null;   // last loaded log meta (from /admin/logs/:path)

        // ── Helpers ────────────────────────────────────────────────────────────
        function escapeHtml(v) {
            return String(v ?? '')
                .replaceAll('&',  '&amp;')
                .replaceAll('<',  '&lt;')
                .replaceAll('>',  '&gt;')
                .replaceAll('"',  '&quot;')
                .replaceAll("'",  '&#39;');
        }

        function buildLogUrl(rel) {
            return '/admin/logs/' + rel.split('/').map(encodeURIComponent).join('/');
        }

        function fmtDate(v)  {
            const d = new Date(v);
            return isNaN(d) ? v : d.toLocaleString();
        }
        function fmtTime(v)  {
            const d = new Date(v);
            return isNaN(d) ? v : d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // Parse METHOD and STATUS_CODE from filename: METHOD_YYYYMMDD_HHMMSS_CODE_NNN.json
        function parseName(fileName) {
            const parts = fileName.replace(/\.json$/i, '').split('_');
            // [0]=METHOD  [1]=YYYYMMDD  [2]=HHMMSS  [3]=CODE  [4]=NNN
            return {
                method: parts[0] || '',
                status: parseInt(parts[3], 10) || parts[3] || '',
            };
        }

        function methodCls(m) {
            return ({
                GET:    'bg-[#1a4d2e] text-[#6fcf97]',
                POST:   'bg-[#1a2f4d] text-[#8ab4f8]',
                PUT:    'bg-[#4d3d1a] text-[#f6c90e]',
                PATCH:  'bg-[#3d1a4d] text-[#c792ea]',
                DELETE: 'bg-[#4d1a1a] text-[#f28b82]',
            })[m.toUpperCase()] || 'bg-[#333] text-[#ccc]';
        }

        function statusCls(code) {
            const n = parseInt(code, 10);
            if (n >= 500) return 'text-[#f28b82]';
            if (n >= 400) return 'text-[#f6c90e]';
            if (n >= 300) return 'text-[#c792ea]';
            if (n >= 200) return 'text-[#6fcf97]';
            return 'text-[#aaa]';
        }

        // ── Sidebar ────────────────────────────────────────────────────────────
        function renderList() {
            const container = document.getElementById('network-list');
            container.innerHTML = '';

            if (!logFiles.length) {
                container.innerHTML = '<div class="px-3 py-3 text-[#777]">No log files available.</div>';
                return;
            }

            logFiles.forEach(log => {
                const sel = log.relative_path === activePath;
                const apiPath = '/' + (log.relative_path.split('/').slice(0, -1).join('/') || log.relative_path);
                const { method, status } = parseName(log.file_name);

                const row = document.createElement('div');
                row.className = 'flex items-center gap-2 px-2 py-[5px] cursor-pointer border-b border-[#2c2c2c] text-[12px] '
                    + (sel ? 'bg-[#1a3a5c]' : 'hover:bg-[#2a2a2a]');

                row.onclick = () => {
                    activePath = log.relative_path;
                    renderList();
                    loadLogDetails(log.relative_path);
                };

                row.innerHTML =
                    `<span class="inline-block text-[10px] font-bold px-1 py-px rounded flex-shrink-0 w-14 text-center truncate ${methodCls(method)}">${escapeHtml(method)}</span>` +
                    `<span class="flex-1 truncate text-[#cccccc]" title="${escapeHtml(apiPath)}">${escapeHtml(apiPath)}</span>` +
                    `<span class="flex-shrink-0 font-mono font-semibold ${statusCls(status)}">${escapeHtml(String(status))}</span>` +
                    `<span class="flex-shrink-0 text-[11px] text-[#888] w-[6.5rem] text-right" title="${escapeHtml(log.date)}">${escapeHtml(fmtTime(log.date))}</span>`;

                container.appendChild(row);
            });
        }

        // ── Tab switching ──────────────────────────────────────────────────────
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const active = btn.dataset.tab === tab;
                btn.className = 'tab-btn flex items-center justify-center cursor-pointer pb-1 border-b-2 '
                    + (active ? 'text-[#8ab4f8] border-[#8ab4f8]' : 'text-[#aaa] border-transparent hover:text-[#eee]');
            });
            if (currentLog) renderDetails(currentLog);
        }

        // ── Detail helpers ─────────────────────────────────────────────────────
        function kvRow(label, value, valClass) {
            return `<tr class="border-b border-[#333]">
                <td class="py-1.5 pr-4 text-[#8ab4f8] font-semibold whitespace-nowrap align-top w-40">${escapeHtml(label)}</td>
                <td class="py-1.5 break-all ${valClass||''}">${escapeHtml(String(value ?? 'null'))}</td>
            </tr>`;
        }

        function jsonPre(data) {
            if (data === null || data === undefined)
                return '<span class="text-[#777] font-mono text-[12px]">null</span>';
            const s = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            return `<pre class="whitespace-pre-wrap break-words text-[#a6accd] font-mono text-[12px]">${escapeHtml(s)}</pre>`;
        }

        // ── Detail panel ───────────────────────────────────────────────────────
        function renderDetails(logMeta) {
            currentLog = logMeta;
            const panel = document.getElementById('network-details');

            let data = null;
            try { data = JSON.parse(logMeta.content || ''); } catch (_) {}

            const { method, status } = parseName(logMeta.file_name);

            if (activeTab === 'overview') {
                panel.innerHTML = `<div class="p-4 font-mono text-[12px]">
                    <table class="w-full">
                        <tbody>
                            ${kvRow('Request ID',  data?.request_id)}
                            ${kvRow('Path',        data?.path)}
                            ${kvRow('Method',      method)}
                            <tr class="border-b border-[#333]">
                                <td class="py-1.5 pr-4 text-[#8ab4f8] font-semibold whitespace-nowrap align-top w-40">Status Code</td>
                                <td class="py-1.5 font-bold ${statusCls(status)}">${escapeHtml(String(status))}</td>
                            </tr>
                            ${kvRow('Latency',     data?.latency_sec != null ? data.latency_sec + ' s' : null)}
                            ${kvRow('Modified',    fmtDate(logMeta.date))}
                            ${kvRow('File',        logMeta.file_name)}
                            ${kvRow('Full Path',   logMeta.full_path)}
                        </tbody>
                    </table>
                </div>`;

            } else if (activeTab === 'request') {
                panel.innerHTML = `<div class="p-4">${jsonPre(data?.request ?? null)}</div>`;

            } else if (activeTab === 'response') {
                panel.innerHTML = `<div class="p-4 font-mono text-[12px]">
                    <table class="w-full mb-5">
                        <tbody>
                            <tr class="border-b border-[#333]">
                                <td class="py-1.5 pr-4 text-[#8ab4f8] font-semibold whitespace-nowrap align-top w-40">Status Code</td>
                                <td class="py-1.5 font-bold ${statusCls(status)}">${escapeHtml(String(status))}</td>
                            </tr>
                            ${kvRow('Latency', data?.latency_sec != null ? data.latency_sec + ' s' : null)}
                        </tbody>
                    </table>
                    ${data?.assistant_response != null ? `
                        <div class="text-[#888] text-[10px] uppercase tracking-wide mb-1 font-semibold">Assistant Response</div>
                        <pre class="whitespace-pre-wrap break-words text-[#a6accd] font-mono text-[12px] mb-5">${escapeHtml(data.assistant_response)}</pre>
                    ` : ''}
                    ${data?.response_body != null ? `
                        <div class="text-[#888] text-[10px] uppercase tracking-wide mb-1 font-semibold">Response Body</div>
                        ${jsonPre(data.response_body)}
                    ` : '<span class="text-[#777]">No response body captured.</span>'}
                </div>`;
            }
        }

        function renderError(msg) {
            document.getElementById('network-details').innerHTML =
                `<div class="flex h-full items-center justify-center px-6 text-[#f28b82] text-center">${escapeHtml(msg)}</div>`;
        }

        // ── Data loading ───────────────────────────────────────────────────────
        async function loadLogs() {
            try {
                const res = await fetch('/admin/logs', { credentials: 'same-origin' });
                if (res.status === 401) { window.location.href = '/app/login'; return; }

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Unable to load logs.');

                logFiles = (data.logs || []).sort((a, b) => new Date(b.date) - new Date(a.date));
                document.getElementById('log-count').textContent = logFiles.length + ' logs';
                renderList();

                if (logFiles.length > 0) {
                    activePath = logFiles[0].relative_path;
                    renderList();
                    await loadLogDetails(activePath);
                } else {
                    renderError('No log files found.');
                }
            } catch (e) {
                renderError(e.message || 'Unable to load logs.');
            }
        }

        async function loadLogDetails(relativePath) {
            try {
                const res = await fetch(buildLogUrl(relativePath), { credentials: 'same-origin' });
                if (res.status === 401) { window.location.href = '/app/login'; return; }

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Unable to load log details.');

                renderDetails(data.log);
            } catch (e) {
                renderError(e.message || 'Unable to load log details.');
            }
        }

        loadLogs();
    </script>
</body>
</html>
